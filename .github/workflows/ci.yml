name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  skill-symlinks:
    name: Plugin skill symlinks resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .claude-plugin skill entries are symlinks that resolve
        run: |
          test -L .claude-plugin/skills/cliproot-capture/SKILL.md
          test -e .claude-plugin/skills/cliproot-capture/SKILL.md
          test -L .claude-plugin/skills/cliproot-session/SKILL.md
          test -e .claude-plugin/skills/cliproot-session/SKILL.md

  plugin-verify:
    name: Plugin structure valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Verify plugin structure
        run: |
          test -e .claude-plugin/skills/cliproot-capture/SKILL.md
          test -e .claude-plugin/skills/cliproot-session/SKILL.md
          test -x .claude-plugin/bin/install-cliproot.sh
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/.mcp.json
          jq empty .claude-plugin/hooks/hooks.json

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  plugin-hook-composition:
    name: Plugin hook composition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run D11 composition test
        run: bash tests/plugin_hook_composition.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: Download CRP example schema
        run: |
          mkdir -p /tmp/crp-schema
          curl -fsSL \
            https://cliproot.github.io/cliproot/schema/examples/crp-v0.0.3.document.example.json \
            -o /tmp/crp-schema/crp-v0.0.3.document.example.json
      - run: cargo test --workspace
        env:
          CRP_EXAMPLE_JSON_PATH: /tmp/crp-schema/crp-v0.0.3.document.example.json
